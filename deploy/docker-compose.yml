services:
  caddy:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.bober-ai.dev}
        NEXT_PUBLIC_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_YANDEX_METRIKA_ID:-110635302}
        NEXT_PUBLIC_PARTNERS_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_PARTNERS_YANDEX_METRIKA_ID:-110926696}
        NEXT_PUBLIC_BITRIX_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_BITRIX_YANDEX_METRIKA_ID:-110926887}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-contact@bober-ai.dev}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
