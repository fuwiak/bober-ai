services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.bober-ai.dev}
        NEXT_PUBLIC_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_YANDEX_METRIKA_ID:-110635302}
        NEXT_PUBLIC_PARTNERS_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_PARTNERS_YANDEX_METRIKA_ID:-110926696}
        NEXT_PUBLIC_BITRIX_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_BITRIX_YANDEX_METRIKA_ID:-110926887}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-contact@bober-ai.dev}
    restart: unless-stopped
    environment:
      PORT: "3000"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-1}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-}
      CONTACT_TELEGRAM_BOT_TOKEN: ${CONTACT_TELEGRAM_BOT_TOKEN:-}
      CONTACT_TELEGRAM_CHAT_ID: ${CONTACT_TELEGRAM_CHAT_ID:-}
      LEADS_LOG_PATH: ${LEADS_LOG_PATH:-/app/data/leads.jsonl}
    ports:
      - "3000:3000"
    volumes:
      - leads_data:/app/data

volumes:
  leads_data:
